# Full nginx.conf for AXM reverse proxy on Windows
# Replace C:\nginx\conf\nginx.conf with this file (after backing up the original).
# Ensure axm.conf is in the same directory (C:\nginx\conf\).

worker_processes  1;
error_log  logs/error.log;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # Long server names and map values need larger buckets
    server_names_hash_bucket_size  64;
    map_hash_bucket_size 128;

    # Omit 'include mime.types' if the file is missing (proxy-only use)
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # AXM reverse proxy - listen 8080, host-based routing
    include axm.conf;
}
