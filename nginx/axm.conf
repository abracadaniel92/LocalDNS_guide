# AXM reverse proxy - local DNS (.local) + Cloudflare Tunnel (.gmojsoski.com)
# Send Host: localhost to backends so Kestrel accepts the request.
# Preserve the original hostname in X-Forwarded-Host for the app's own URL generation.

server {
    listen       8080;
    server_name  axm.local ~^axm\.local axm.gmojsoski.com;

    location / {
        proxy_pass http://127.0.0.1:50000;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

