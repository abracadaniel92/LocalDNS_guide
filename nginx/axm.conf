# AXM reverse proxy - local DNS (.local) + Cloudflare Tunnel (.gmojsoski.com)
# Send Host + X-Forwarded-* so backend builds correct login/redirect URLs (axm.local:8080).
#
# Forwarded headers (same as IIS server variables):
#   X-Forwarded-Host   -> HTTP_X_FORWARDED_HOST
#   X-Forwarded-Proto  -> HTTP_X_FORWARDED_PROTO
#   X-Forwarded-For    -> HTTP_X_FORWARDED_FOR

# Bundle ports: Platform 50003, SuperAdmin 50004, VnHost 50005, CommNode 60125
server {
    listen       8080;
    server_name  axm.local ~^axm\.local axm.gmojsoski.com;

    location / {
        proxy_pass http://127.0.0.1:50003;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

